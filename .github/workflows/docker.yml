name: Build and push Docker image

on:
  push:
    branches:
      - main
      - "feature/**"
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - "internal/viz/static/**"
      - ".github/workflows/docker.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go vet ./...
      - run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute tags based on the branch:
      #   main    → :latest + :main + :sha-<short>
      #   feature → :beta   + :feature-<name> + :sha-<short>
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/dzarlax-ai/personal-memory
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=beta,enable=${{ github.ref_name != github.event.repository.default_branch }}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
