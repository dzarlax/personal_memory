<!DOCTYPE html>
<html lang="en" dark-mode>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Dashboard</title>
<link rel="stylesheet" href="/viz/assets/vendor/dzarlax.css">
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<script src="https://unpkg.com/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.js"></script>
<link href="https://unpkg.com/vis-timeline@7.7.3/styles/vis-timeline-graph2d.min.css" rel="stylesheet">
<link rel="stylesheet" href="/viz/assets/styles.css">
</head>
<body>
  <header class="viz-header">
    <h1>Memory Dashboard</h1>
    <div class="viz-stats" id="stats"></div>
  </header>

  <nav class="tab-nav viz-tabs">
    <a class="tab-nav-item" data-view="overview" href="/viz/overview">Overview</a>
    <a class="tab-nav-item" data-view="duplicates" href="/viz/duplicates">Duplicates <span class="badge badge--neutral" id="dup-badge">0</span></a>
    <a class="tab-nav-item" data-view="forgotten" href="/viz/forgotten">Forgotten <span class="badge badge--neutral" id="forgot-badge">0</span></a>
    <a class="tab-nav-item" data-view="timeline" href="/viz/timeline">Timeline</a>
    <a class="tab-nav-item" data-view="graph" href="/viz/graph">Graph</a>
    <a class="tab-nav-item" data-view="documents" href="/viz/documents" id="docs-tab">Documents <span class="badge badge--neutral" id="docs-badge">0</span></a>
  </nav>

  <!-- VIEWS -->

  <script src="/viz/assets/js/shared.js"></script>
  <script src="/viz/assets/js/overview.js"></script>
  <script src="/viz/assets/js/duplicates.js"></script>
  <script src="/viz/assets/js/forgotten.js"></script>
  <script src="/viz/assets/js/timeline.js"></script>
  <script src="/viz/assets/js/graph.js"></script>
  <script src="/viz/assets/js/documents.js"></script>
  <script src="/viz/assets/js/init.js"></script>
</body>
</html>
