              - article [ref=e325]:
                - generic [ref=e326]:
                  - heading "LLM Personal Knowledge Base" [level=1] [ref=e327]
                  - 'link "Permalink: LLM Personal Knowledge Base" [ref=e328] [cursor=pointer]':
                    - /url: "#llm-personal-knowledge-base"
                    - img [ref=e329]
                - paragraph [ref=e331]:
                  - strong [ref=e332]: Your AI conversations compile themselves into a searchable knowledge base.
                - paragraph [ref=e333]:
                  - text: Adapted from
                  - link "Karpathy's LLM Knowledge Base" [ref=e334] [cursor=pointer]:
                    - /url: https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f
                  - text: architecture, but instead of clipping web articles, the raw data is your own conversations with Claude Code. When a session ends (or auto-compacts mid-session), Claude Code hooks capture the conversation transcript and spawn a background process that uses the
                  - link "Claude Agent SDK" [ref=e335] [cursor=pointer]:
                    - /url: https://github.com/anthropics/claude-agent-sdk
                  - text: to extract the important stuff - decisions, lessons learned, patterns, gotchas - and appends it to a daily log. You then compile those daily logs into structured, cross-referenced knowledge articles organized by concept. Retrieval uses a simple index file instead of RAG - no vector database, no embeddings, just markdown.
                - paragraph [ref=e336]: Anthropic has clarified that personal use of the Claude Agent SDK is covered under your existing Claude subscription (Max, Team, or Enterprise) - no separate API credits needed. Unlike OpenClaw, which requires API billing for its memory flush, this runs on your subscription.
                - generic [ref=e337]:
                  - heading "Quick Start" [level=2] [ref=e338]
                  - 'link "Permalink: Quick Start" [ref=e339] [cursor=pointer]':
                    - /url: "#quick-start"
                    - img [ref=e340]
                - paragraph [ref=e342]: "Tell your AI coding agent:"
                - blockquote [ref=e343]:
                  - paragraph [ref=e344]:
                    - text: "\"Clone"
                    - link "https://github.com/coleam00/claude-memory-compiler" [ref=e345] [cursor=pointer]:
                      - /url: https://github.com/coleam00/claude-memory-compiler
                    - text: into this project. Set up the Claude Code hooks so my conversations automatically get captured into daily logs, compiled into a knowledge base, and injected back into future sessions. Read the AGENTS.md for the full technical reference on how everything works."
                - paragraph [ref=e346]: "The agent will:"
                - list [ref=e347]:
                  - listitem [ref=e348]:
                    - text: Clone the repo and run
                    - code [ref=e349]: uv sync
                    - text: to install dependencies
                  - listitem [ref=e350]:
                    - text: Copy
                    - code [ref=e351]: .claude/settings.json
                    - text: into your project (or merge the hooks into your existing settings)
                  - listitem [ref=e352]: The hooks activate automatically next time you open Claude Code
                - paragraph [ref=e353]:
                  - text: From there, your conversations start accumulating. After 6 PM local time, the next session flush automatically triggers compilation of that day's logs into knowledge articles. You can also run
                  - code [ref=e354]: uv run python scripts/compile.py
                  - text: manually at any time.
                - generic [ref=e355]:
                  - heading "How It Works" [level=2] [ref=e356]
                  - 'link "Permalink: How It Works" [ref=e357] [cursor=pointer]':
                    - /url: "#how-it-works"
                    - img [ref=e358]
                - generic [ref=e360]:
                  - code [ref=e362]: Conversation -> SessionEnd/PreCompact hooks -> flush.py extracts knowledge -> daily/YYYY-MM-DD.md -> compile.py -> knowledge/concepts/, connections/, qa/ -> SessionStart hook injects index into next session -> cycle repeats
                  - button "Copy" [ref=e364] [cursor=pointer]:
                    - img [ref=e365]
                - list [ref=e368]:
                  - listitem [ref=e369]:
                    - strong [ref=e370]: Hooks
                    - text: capture conversations automatically (session end + pre-compaction safety net)
                  - listitem [ref=e371]:
                    - strong [ref=e372]: flush.py
                    - text: calls the Claude Agent SDK to decide what's worth saving, and after 6 PM triggers end-of-day compilation automatically
                  - listitem [ref=e373]:
                    - strong [ref=e374]: compile.py
                    - text: turns daily logs into organized concept articles with cross-references (triggered automatically or run manually)
                  - listitem [ref=e375]:
                    - strong [ref=e376]: query.py
                    - text: answers questions using index-guided retrieval (no RAG needed at personal scale)
                  - listitem [ref=e377]:
                    - strong [ref=e378]: lint.py
                    - text: runs 7 health checks (broken links, orphans, contradictions, staleness)
                - generic [ref=e379]:
                  - heading "Key Commands" [level=2] [ref=e380]
                  - 'link "Permalink: Key Commands" [ref=e381] [cursor=pointer]':
                    - /url: "#key-commands"
                    - img [ref=e382]
                - generic [ref=e384]:
                  - generic [ref=e385]:
                    - text: uv run python scripts/compile.py
                    - generic [ref=e386]: "# compile new daily logs"
