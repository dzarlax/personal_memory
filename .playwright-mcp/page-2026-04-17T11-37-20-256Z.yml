                    - /url: "#why-no-rag"
                    - img [ref=e401]
                - paragraph [ref=e403]:
                  - text: "Karpathy's insight: at personal scale (50-500 articles), the LLM reading a structured"
                  - code [ref=e404]: index.md
                  - text: outperforms vector similarity. The LLM understands what you're really asking; cosine similarity just finds similar words. RAG becomes necessary at ~2,000+ articles when the index exceeds the context window.
