        - region "llm-wiki.md content, created by karpathy on 04:25PM on April 04." [ref=e119]:
          - article [ref=e120]:
            - generic [ref=e121]:
              - heading "LLM Wiki" [level=1] [ref=e122]
              - 'link "Permalink: LLM Wiki" [ref=e123] [cursor=pointer]':
                - /url: "#llm-wiki"
                - img [ref=e124]
            - paragraph [ref=e126]: A pattern for building personal knowledge bases using LLMs.
            - paragraph [ref=e127]: This is an idea file, it is designed to be copy pasted to your own LLM Agent (e.g. OpenAI Codex, Claude Code, OpenCode / Pi, or etc.). Its goal is to communicate the high level idea, but your agent will build out the specifics in collaboration with you.
            - generic [ref=e128]:
              - heading "The core idea" [level=2] [ref=e129]
              - 'link "Permalink: The core idea" [ref=e130] [cursor=pointer]':
                - /url: "#the-core-idea"
                - img [ref=e131]
            - paragraph [ref=e133]: "Most people's experience with LLMs and documents looks like RAG: you upload a collection of files, the LLM retrieves relevant chunks at query time, and generates an answer. This works, but the LLM is rediscovering knowledge from scratch on every question. There's no accumulation. Ask a subtle question that requires synthesizing five documents, and the LLM has to find and piece together the relevant fragments every time. Nothing is built up. NotebookLM, ChatGPT file uploads, and most RAG systems work this way."
            - paragraph [ref=e134]:
              - text: The idea here is different. Instead of just retrieving from raw documents at query time, the LLM
              - strong [ref=e135]: incrementally builds and maintains a persistent wiki
              - text: — a structured, interlinked collection of markdown files that sits between you and the raw sources. When you add a new source, the LLM doesn't just index it for later retrieval. It reads it, extracts the key information, and integrates it into the existing wiki — updating entity pages, revising topic summaries, noting where new data contradicts old claims, strengthening or challenging the evolving synthesis. The knowledge is compiled once and then
              - emphasis [ref=e136]: kept current
              - text: ", not re-derived on every query."
            - paragraph [ref=e137]:
              - text: "This is the key difference:"
              - strong [ref=e138]: the wiki is a persistent, compounding artifact.
              - text: The cross-references are already there. The contradictions have already been flagged. The synthesis already reflects everything you've read. The wiki keeps getting richer with every source you add and every question you ask.
            - paragraph [ref=e139]: You never (or rarely) write the wiki yourself — the LLM writes and maintains all of it. You're in charge of sourcing, exploration, and asking the right questions. The LLM does all the grunt work — the summarizing, cross-referencing, filing, and bookkeeping that makes a knowledge base actually useful over time. In practice, I have the LLM agent open on one side and Obsidian open on the other. The LLM makes edits based on our conversation, and I browse the results in real time — following links, checking the graph view, reading the updated pages. Obsidian is the IDE; the LLM is the programmer; the wiki is the codebase.
            - paragraph [ref=e140]: "This can apply to a lot of different contexts. A few examples:"
            - list [ref=e141]:
              - listitem [ref=e142]:
                - strong [ref=e143]: Personal
                - text: ": tracking your own goals, health, psychology, self-improvement — filing journal entries, articles, podcast notes, and building up a structured picture of yourself over time."
              - listitem [ref=e144]:
                - strong [ref=e145]: Research
                - text: ": going deep on a topic over weeks or months — reading papers, articles, reports, and incrementally building a comprehensive wiki with an evolving thesis."
              - listitem [ref=e146]:
                - strong [ref=e147]: Reading a book
                - text: ": filing each chapter as you go, building out pages for characters, themes, plot threads, and how they connect. By the end you have a rich companion wiki. Think of fan wikis like"
                - link "Tolkien Gateway" [ref=e148] [cursor=pointer]:
                  - /url: https://tolkiengateway.net/wiki/Main_Page
                - text: — thousands of interlinked pages covering characters, places, events, languages, built by a community of volunteers over years. You could build something like that personally as you read, with the LLM doing all the cross-referencing and maintenance.
              - listitem [ref=e149]:
                - strong [ref=e150]: Business/team
                - text: ": an internal wiki maintained by LLMs, fed by Slack threads, meeting transcripts, project documents, customer calls. Possibly with humans in the loop reviewing updates. The wiki stays current because the LLM does the maintenance that no one on the team wants to do."
              - listitem [ref=e151]:
                - strong [ref=e152]: Competitive analysis, due diligence, trip planning, course notes, hobby deep-dives
                - text: — anything where you're accumulating knowledge over time and want it organized rather than scattered.
            - generic [ref=e153]:
              - heading "Architecture" [level=2] [ref=e154]
              - 'link "Permalink: Architecture" [ref=e155] [cursor=pointer]':
                - /url: "#architecture"
                - img [ref=e156]
            - paragraph [ref=e158]: "There are three layers:"
            - paragraph [ref=e159]:
              - strong [ref=e160]: Raw sources
              - text: — your curated collection of source documents. Articles, papers, images, data files. These are immutable — the LLM reads from them but never modifies them. This is your source of truth.
            - paragraph [ref=e161]:
              - strong [ref=e162]: The wiki
              - text: — a directory of LLM-generated markdown files. Summaries, entity pages, concept pages, comparisons, an overview, a synthesis. The LLM owns this layer entirely. It creates pages, updates them when new sources arrive, maintains cross-references, and keeps everything consistent. You read it; the LLM writes it.
            - paragraph [ref=e163]:
              - strong [ref=e164]: The schema
              - text: — a document (e.g. CLAUDE.md for Claude Code or AGENTS.md for Codex) that tells the LLM how the wiki is structured, what the conventions are, and what workflows to follow when ingesting sources, answering questions, or maintaining the wiki. This is the key configuration file — it's what makes the LLM a disciplined wiki maintainer rather than a generic chatbot. You and the LLM co-evolve this over time as you figure out what works for your domain.
            - generic [ref=e165]:
              - heading "Operations" [level=2] [ref=e166]
              - 'link "Permalink: Operations" [ref=e167] [cursor=pointer]':
                - /url: "#operations"
                - img [ref=e168]
            - paragraph [ref=e170]:
              - strong [ref=e171]: Ingest.
              - text: "You drop a new source into the raw collection and tell the LLM to process it. An example flow: the LLM reads the source, discusses key takeaways with you, writes a summary page in the wiki, updates the index, updates relevant entity and concept pages across the wiki, and appends an entry to the log. A single source might touch 10-15 wiki pages. Personally I prefer to ingest sources one at a time and stay involved — I read the summaries, check the updates, and guide the LLM on what to emphasize. But you could also batch-ingest many sources at once with less supervision. It's up to you to develop the workflow that fits your style and document it in the schema for future sessions."
            - paragraph [ref=e172]:
              - strong [ref=e173]: Query.
              - text: "You ask questions against the wiki. The LLM searches for relevant pages, reads them, and synthesizes an answer with citations. Answers can take different forms depending on the question — a markdown page, a comparison table, a slide deck (Marp), a chart (matplotlib), a canvas. The important insight:"
              - strong [ref=e174]: good answers can be filed back into the wiki as new pages.
              - text: A comparison you asked for, an analysis, a connection you discovered — these are valuable and shouldn't disappear into chat history. This way your explorations compound in the knowledge base just like ingested sources do.
            - paragraph [ref=e175]:
              - strong [ref=e176]: Lint.
              - text: "Periodically, ask the LLM to health-check the wiki. Look for: contradictions between pages, stale claims that newer sources have superseded, orphan pages with no inbound links, important concepts mentioned but lacking their own page, missing cross-references, data gaps that could be filled with a web search. The LLM is good at suggesting new questions to investigate and new sources to look for. This keeps the wiki healthy as it grows."
            - generic [ref=e177]:
              - heading "Indexing and logging" [level=2] [ref=e178]
              - 'link "Permalink: Indexing and logging" [ref=e179] [cursor=pointer]':
                - /url: "#indexing-and-logging"
                - img [ref=e180]
            - paragraph [ref=e182]: "Two special files help the LLM (and you) navigate the wiki as it grows. They serve different purposes:"
            - paragraph [ref=e183]:
              - strong [ref=e184]: index.md
              - text: is content-oriented. It's a catalog of everything in the wiki — each page listed with a link, a one-line summary, and optionally metadata like date or source count. Organized by category (entities, concepts, sources, etc.). The LLM updates it on every ingest. When answering a query, the LLM reads the index first to find relevant pages, then drills into them. This works surprisingly well at moderate scale (~100 sources, ~hundreds of pages) and avoids the need for embedding-based RAG infrastructure.
            - paragraph [ref=e185]:
              - strong [ref=e186]: log.md
              - text: "is chronological. It's an append-only record of what happened and when — ingests, queries, lint passes. A useful tip: if each entry starts with a consistent prefix (e.g."
              - code [ref=e187]: "## [2026-04-02] ingest | Article Title"
              - text: ), the log becomes parseable with simple unix tools —
              - code [ref=e188]: grep "^## \[" log.md | tail -5
              - text: gives you the last 5 entries. The log gives you a timeline of the wiki's evolution and helps the LLM understand what's been done recently.
            - generic [ref=e189]:
              - 'heading "Optional: CLI tools" [level=2] [ref=e190]'
              - 'link "Permalink: Optional: CLI tools" [ref=e191] [cursor=pointer]':
                - /url: "#optional-cli-tools"
                - img [ref=e192]
            - paragraph [ref=e194]:
              - text: At some point you may want to build small tools that help the LLM operate on the wiki more efficiently. A search engine over the wiki pages is the most obvious one — at small scale the index file is enough, but as the wiki grows you want proper search.
              - link "qmd" [ref=e195] [cursor=pointer]:
                - /url: https://github.com/tobi/qmd
              - text: "is a good option: it's a local search engine for markdown files with hybrid BM25/vector search and LLM re-ranking, all on-device. It has both a CLI (so the LLM can shell out to it) and an MCP server (so the LLM can use it as a native tool). You could also build something simpler yourself — the LLM can help you vibe-code a naive search script as the need arises."
            - generic [ref=e196]:
              - heading "Tips and tricks" [level=2] [ref=e197]
              - 'link "Permalink: Tips and tricks" [ref=e198] [cursor=pointer]':
                - /url: "#tips-and-tricks"
                - img [ref=e199]
            - list [ref=e201]:
              - listitem [ref=e202]:
                - strong [ref=e203]: Obsidian Web Clipper
                - text: is a browser extension that converts web articles to markdown. Very useful for quickly getting sources into your raw collection.
              - listitem [ref=e204]:
                - strong [ref=e205]: Download images locally.
                - text: In Obsidian Settings → Files and links, set "Attachment folder path" to a fixed directory (e.g.
                - code [ref=e206]: raw/assets/
                - text: ). Then in Settings → Hotkeys, search for "Download" to find "Download attachments for current file" and bind it to a hotkey (e.g. Ctrl+Shift+D). After clipping an article, hit the hotkey and all images get downloaded to local disk. This is optional but useful — it lets the LLM view and reference images directly instead of relying on URLs that may break. Note that LLMs can't natively read markdown with inline images in one pass — the workaround is to have the LLM read the text first, then view some or all of the referenced images separately to gain additional context. It's a bit clunky but works well enough.
              - listitem [ref=e207]:
                - strong [ref=e208]: Obsidian's graph view
                - text: is the best way to see the shape of your wiki — what's connected to what, which pages are hubs, which are orphans.
              - listitem [ref=e209]:
                - strong [ref=e210]: Marp
                - text: is a markdown-based slide deck format. Obsidian has a plugin for it. Useful for generating presentations directly from wiki content.
              - listitem [ref=e211]:
                - strong [ref=e212]: Dataview
                - text: is an Obsidian plugin that runs queries over page frontmatter. If your LLM adds YAML frontmatter to wiki pages (tags, dates, source counts), Dataview can generate dynamic tables and lists.
              - listitem [ref=e213]: The wiki is just a git repo of markdown files. You get version history, branching, and collaboration for free.
            - generic [ref=e214]:
              - heading "Why this works" [level=2] [ref=e215]
              - 'link "Permalink: Why this works" [ref=e216] [cursor=pointer]':
                - /url: "#why-this-works"
                - img [ref=e217]
            - paragraph [ref=e219]: The tedious part of maintaining a knowledge base is not the reading or the thinking — it's the bookkeeping. Updating cross-references, keeping summaries current, noting when new data contradicts old claims, maintaining consistency across dozens of pages. Humans abandon wikis because the maintenance burden grows faster than the value. LLMs don't get bored, don't forget to update a cross-reference, and can touch 15 files in one pass. The wiki stays maintained because the cost of maintenance is near zero.
            - paragraph [ref=e220]: The human's job is to curate sources, direct the analysis, ask good questions, and think about what it all means. The LLM's job is everything else.
            - paragraph [ref=e221]: "The idea is related in spirit to Vannevar Bush's Memex (1945) — a personal, curated knowledge store with associative trails between documents. Bush's vision was closer to this than to what the web became: private, actively curated, with the connections between documents as valuable as the documents themselves. The part he couldn't solve was who does the maintenance. The LLM handles that."
            - generic [ref=e222]:
              - heading "Note" [level=2] [ref=e223]
              - 'link "Permalink: Note" [ref=e224] [cursor=pointer]':
                - /url: "#note"
                - img [ref=e225]
            - paragraph [ref=e227]: "This document is intentionally abstract. It describes the idea, not a specific implementation. The exact directory structure, the schema conventions, the page formats, the tooling — all of that will depend on your domain, your preferences, and your LLM of choice. Everything mentioned above is optional and modular — pick what's useful, ignore what isn't. For example: your sources might be text-only, so you don't need image handling at all. Your wiki might be small enough that the index file is all you need, no search engine required. You might not care about slide decks and just want markdown pages. You might want a completely different set of output formats. The right way to use this is to share it with your LLM agent and work together to instantiate a version that fits your needs. The document's only job is to communicate the pattern. Your LLM can figure out the rest."
