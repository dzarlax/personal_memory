                    - text: commented
                    - link "Apr 16, 2026yesterday" [ref=e299] [cursor=pointer]:
                      - /url: /karpathy/442a6bf555914893e9891c11519de94f?permalink_comment_id=6103209#gistcomment-6103209
              - generic [ref=e302]:
                - paragraph [ref=e303]: I doubt an LLM would be able to maintain something like this properly. If we're talking about a relatively small amount of files and entries, sure, but if we're talking about something bigger, something where an architecture like this one would be more interesting than regular RAG, I doubt an LLM (or 2, or 10, doesn't matter, more LLMs mean more problems anyway) would maintain it in a clean way.
                - paragraph [ref=e304]:
                  - text: In fact, from experience, LLMs are pretty bad at maintaining stuff, and even worse at making sure the stuff they generate is easily maintainable. You can do all the "prompt engineering" in the world but it will never fix the glaring flaws LLMs have.
                  - text: And unlike RAG, this gives the opportunity to the LLM to actually hallucinate what is contained in the documents, since it's gonna base its searches on the summaries and wiki pages it created itself. Again, not an issue with a small amount of entries, but if it only works with small amount of entries, why even bother, just use RAG or something similar.
                - paragraph [ref=e305]: Since we're talking about humans struggling to maintain big wikis, yes this is true, and LLMs could HELP maintaining these, but I strongly believe that an LLM can't be trusted to create AND maintain it's own wiki with (almost) no human supervision and control.
                - paragraph [ref=e306]:
                  - text: And about the "pointing out contradictions" thing, yeah I don't believe it can do that either in a consistent way. A lot cutting-edge LLMs already struggle with pointing out contradictions in regular conversations, so in a whole wiki with hundreds of entries ? Highly doubt it would.
                  - text: And speaking of consistency, LLMs aren't "consistent", so I don't know why this word is even used here. They're the opposite of consistent, that's the issue.
                - paragraph [ref=e307]:
                  - text: So overall an interesting take on how to improve RAG and similar technologies, but not something that is doable on the scale you'd want for something like this in my opinion. I don't think there's much of a benefit in a small scale, and in a bigger scale I think it wouldn't work.
                  - text: Feel free to prove me wrong though. I just think a lot of people hear only what they want to hear, and think LLMs will magically become flawless with just some prompt engineering and some "hacks".
