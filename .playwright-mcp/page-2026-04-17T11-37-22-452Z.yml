              - generic [ref=e329]:
                - paragraph [ref=e330]: In all the discussion about LLM wikis, knowledge management, compaction, and retrieval, I notice one pattern that nobody is addressing.
                - paragraph [ref=e331]: "Knowledge systems tend to treat their participants as symmetric. But in human-AI systems, they aren't. Three structural asymmetries:"
                - paragraph [ref=e332]:
                  - strong [ref=e333]: Speed
                  - text: ": An agent can generate, index, and restructure knowledge orders of magnitude faster than a human can review it. This is discussed (Generation Effect,"
                  - link "@iBlinkQ" [ref=e334] [cursor=pointer]:
                    - /url: https://github.com/iBlinkQ
                  - text: "'s \"hiring a robot to work out for you\"), but usually framed as a discipline problem. It isn't. It's structural."
                - paragraph [ref=e335]:
                  - strong [ref=e336]: Mortality
                  - text: ": Humans forget. Humans leave projects. Humans die. Agents persist. When a knowledge unit was created by a human who is no longer present, who curates it? Who decides whether it's still valid? An agent holding stale knowledge from departed contributors isn't a bug, it's the default state of any long-lived human-AI system."
                - paragraph [ref=e337]:
                  - strong [ref=e338]: Identity
                  - text: ": Agents can be forked, cloned, migrated, restarted. Humans can't. If your reputation or provenance system assumes stable identity, agent forking breaks it."
                - paragraph [ref=e339]:
                  - text: The "append-only wiki becomes a mess" problem (
                  - link "@benjimixvidz" [ref=e340] [cursor=pointer]:
                    - /url: https://github.com/benjimixvidz
                  - text: ) and "data and mental model drift" (
                  - link "@joshwand" [ref=e341] [cursor=pointer]:
                    - /url: https://github.com/joshwand
                  - text: ) are symptoms. The underlying cause is that knowledge systems designed for symmetric participants behave differently when one side is mortal and the other isn't.
                - paragraph [ref=e342]: Has anyone encountered this in practice? Specifically, when the human who created key entries is no longer around, do you have a mechanism for that, or do you just accumulate?
