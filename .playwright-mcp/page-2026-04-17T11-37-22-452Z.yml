                - paragraph [ref=e553]: All specific constraints below flow from this meta-constraint.
                - separator [ref=e554]
                - heading "Constraints (8)" [level=2] [ref=e555]
                - paragraph [ref=e556]:
                  - strong [ref=e557]: C1. Dunbar's Number (~150)
                  - text: Humans cannot scale relationships beyond ~150 stable contacts (per Dunbar's research, layered roughly 5/15/50/150/500/1500, debated in digital-age literature but structurally grounded). Network topology = nested groups, not a global mesh. Each layer represents different trust depth and interaction type.
                - paragraph [ref=e558]:
                  - strong [ref=e559]: C2. CAP Theorem
                  - text: At scale from single-node to billions of nodes, network partitions are inevitable. We choose AP (availability + partition tolerance), sacrificing strict consistency. Conflict resolution is eventual, not immediate.
                - paragraph [ref=e560]:
                  - strong [ref=e561]: C3. Human Cognitive Bottleneck
                  - text: "The entire system is a machine for optimizing throughput to human memory consolidation, attention, and decision-making capacity. The human is the narrowest bottleneck. Consequence: the Generation Effect (Jacoby, 1978), information is better remembered when actively generated rather than passively read. Knowledge automatically extracted by an LLM does not create learning. The human decides what to keep."
                - paragraph [ref=e562]:
                  - strong [ref=e563]: C4. Language (~7000)
                  - text: Knowledge is created in a specific language, not in a vacuum. ~7000 languages exist. We store the original; translation is a presentation layer. A translator is lossy; the original is the source of truth.
                - paragraph [ref=e564]:
                  - strong [ref=e565]: C5. Self-Contained Information
                  - text: "Every unit of knowledge is self-sufficient: it can be understood and used without knowing who sent it. Requires embedded provenance, context, and confidence."
                - paragraph [ref=e566]:
                  - strong [ref=e567]: C6. End-to-End Encryption
                  - text: Not a feature, a survival condition. Without E2E, any relay node can read knowledge. Sovereignty is impossible without confidentiality.
                - paragraph [ref=e568]:
                  - strong [ref=e569]: C7. Lifecycle Asymmetry
                  - text: (consequence of Substrate Dependency)
                  - text: "Humans die; agents do not. Three structural effects: (1) knowledge accumulation without succession, knowledge persists without a living curator; (2) no fresh perspective, the agent does not go through generational refresh; (3) authority without revision, knowledge goes un-rechecked if the author has died."
                - paragraph [ref=e570]:
                  - strong [ref=e571]: C8. Agent Substrate
                  - text: (consequence of Substrate Dependency)
                  - text: The agent's substrate is rented, not owned. The model belongs to the provider, not the user. The provider can deprecate a model, change behavior, or cut off access. A model swap can change the agent's behavioral characteristics and capabilities. The architecture must treat substrate as an explicit design dimension.
