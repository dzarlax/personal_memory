                - paragraph [ref=e1278]: "Let me connect the dots:"
                - paragraph [ref=e1279]:
                  - text: What he said about vibe-coded code What applies to LLM-Wiki
                  - text: "\"I can't really understand it\" The human cannot verify the wiki's contents"
                  - text: "\"It grows beyond my ability\" The wiki becomes an unmanageable mess"
                  - text: "\"Throwaway weekend projects only\" LLM-Wiki is fine for 100 files, dies at 10,000"
                  - text: "\"Requires real engineering\" Real knowledge needs databases, foreign keys, permissions"
                - paragraph [ref=e1280]: His own critique of vibe-coding applies directly to his own LLM-Wiki pattern.
                - paragraph [ref=e1281]: He warned that too much AI-generated code leads nowhere — incoherent, unmaintainable, shallow. But then he turned around and told people to let LLMs generate their entire knowledge base.
                - paragraph [ref=e1282]: "The contradiction: Code generated by AI is suspect. Knowledge generated by AI is somehow trustworthy?"
                - paragraph [ref=e1283]: "\"Too much generated coffee leads nowhere\" — exactly. The LLM can generate infinite text. But text without depth, without human curation, without referential integrity, without permissions, without versioning — is just noise. It doesn't compound. It dilutes."
                - paragraph [ref=e1284]: He joined the people he warned about. 🐑💀
                - paragraph [ref=e1285]: The shepherd became the sheep.
