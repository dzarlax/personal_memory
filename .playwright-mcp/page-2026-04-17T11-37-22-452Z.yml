              - generic [ref=e658]:
                - blockquote [ref=e659]:
                  - paragraph [ref=e660]: I doubt an LLM would be able to maintain something like this properly. If we're talking about a relatively small amount of files and entries, sure, but if we're talking about something bigger, something where an architecture like this one would be more interesting than regular RAG, I doubt an LLM (or 2, or 10, doesn't matter, more LLMs mean more problems anyway) would maintain it in a clean way.
                  - paragraph [ref=e661]: In fact, from experience, LLMs are pretty bad at maintaining stuff, and even worse at making sure the stuff they generate is easily maintainable. You can do all the "prompt engineering" in the world but it will never fix the glaring flaws LLMs have. And unlike RAG, this gives the opportunity to the LLM to actually hallucinate what is contained in the documents, since it's gonna base its searches on the summaries and wiki pages it created itself. Again, not an issue with a small amount of entries, but if it only works with small amount of entries, why even bother, just use RAG or something similar.
                  - paragraph [ref=e662]: Since we're talking about humans struggling to maintain big wikis, yes this is true, and LLMs could HELP maintaining these, but I strongly believe that an LLM can't be trusted to create AND maintain it's own wiki with (almost) no human supervision and control.
                  - paragraph [ref=e663]: And about the "pointing out contradictions" thing, yeah I don't believe it can do that either in a consistent way. A lot cutting-edge LLMs already struggle with pointing out contradictions in regular conversations, so in a whole wiki with hundreds of entries ? Highly doubt it would. And speaking of consistency, LLMs aren't "consistent", so I don't know why this word is even used here. They're the opposite of consistent, that's the issue.
                  - paragraph [ref=e664]: So overall an interesting take on how to improve RAG and similar technologies, but not something that is doable on the scale you'd want for something like this in my opinion. I don't think there's much of a benefit in a small scale, and in a bigger scale I think it wouldn't work. Feel free to prove me wrong though. I just think a lot of people hear only what they want to hear, and think LLMs will magically become flawless with just some prompt engineering and some "hacks".
                - paragraph [ref=e665]: "These are fair and important concerns, and they mostly point at what the architecture has to solve, not reasons it can't work. You're right that a raw LLM doing unsupervised free-form wiki maintenance would fail at scale. That's not the design. In Synthadoc (one implementation of this pattern), the LLM operates inside a constrained pipeline: structured JSON schemas, source URLs pinned to every page, confidence scoring on each operation, and explicit human-in-the-loop for anything below an 80% confidence threshold. Contradictions at low confidence queue for manual review, they don't auto-resolve. Orphan pages require human linking decisions. The LLM reduces curation burden; it doesn't replace human judgement."
                - paragraph [ref=e666]: Your hallucination concern is the one I'd take most seriously. If the LLM generates summaries and later queries those same summaries, you get compounding error. The mitigation is treating wiki pages as structured derivatives of source documents, not ground truth, and keeping original source citations intact so re-ingestion can correct drift. Whether that's sufficient at very large scale is a real open question.
                - paragraph [ref=e667]: On "why bother at small scale vs RAG", the compounding benefit is the answer. RAG at medium scale (50–500 domain pages) retrieves raw document noise. A curated, cross-referenced wiki retrieves a synthesised answer with context about what changed and what conflicts. That gap widens as the domain grows, not the opposite.
                - paragraph [ref=e668]: You're right that "consistent" is the wrong word for LLMs. The consistency the pattern aims for comes from the structure such schemas, categories, link graphs, not from LLM output being deterministic. That distinction matters.
                - paragraph [ref=e669]: The honest version of the claim isn't "LLMs will magically maintain a perfect wiki." It's "a structured pipeline with LLM assistance and deliberate HITL checkpoints can maintain a wiki better than humans alone, for a specific class of domain-sized knowledge bases." That's a narrower and more defensible claim.
                - paragraph [ref=e670]: "If you want to validate the claims against the actual implementation rather than take our word for it:"
                - paragraph [ref=e671]:
                  - text: "GitHub:"
                  - link "https://github.com/axoviq-ai/synthadoc" [ref=e672] [cursor=pointer]:
                    - /url: https://github.com/axoviq-ai/synthadoc
                - paragraph [ref=e673]: The contradiction detection, confidence thresholds, and HITL queue are all in synthadoc/core/ if you want to dig into the specifics.
