                      - cell "Dunbar (~150 relationships), attention span, mortality" [ref=e539]
                      - cell "Token window, rate limits, model capability" [ref=e540]
                    - row "Ownership Owns it, inalienable Rents it, provider decides deprecation" [ref=e541]:
