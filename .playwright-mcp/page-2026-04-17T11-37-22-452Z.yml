                - paragraph [ref=e514]:
                  - emphasis [ref=e515]: Working draft for external review. We are drawing an architecture without a canonical reference implementation; errors in the foundation will compound through everything built on top.
                - separator [ref=e516]
                - heading "Framing" [level=2] [ref=e517]
                - paragraph [ref=e518]: "The AI industry is centralizing knowledge, compute, and control. Each corporation rationally maximizes its own gain (Hardin's Tragedy of the Commons, 1968), collectively undermining user sovereignty. We seek Ostrom's Third Way (Nobel 2009): community-managed, protocol-enforced, user-sovereign."
                - paragraph [ref=e519]: "We stand on the shoulders of Engelbart's Open Hyperdocument System (1998), extending into territory Engelbart did not address: crypto identity, Dunbar layers, agent mesh, substrate-aware design."
                - paragraph [ref=e520]: The architecture scales from a single human with one agent to all of humanity (~8 billion) each with one or more agents. Every constraint must hold at both ends of this range.
                - paragraph [ref=e521]: "The network is two-layer: humans interact with humans, agents interact with agents, and humans interact with agents. Each layer operates under the same constraints but with different substrate properties."
                - separator [ref=e522]
                - 'heading "Meta-Constraint: Substrate Dependency" [level=2] [ref=e523]'
                - paragraph [ref=e524]: "Every cognitive participant in the system is constrained by its substrate. Two substrate classes:"
