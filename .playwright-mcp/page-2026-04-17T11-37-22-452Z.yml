                - paragraph [ref=e272]:
                  - text: "And most importantly for the \"wiki\" angle:"
                  - strong [ref=e273]: you can tell Cherry Studio to expand your knowledge into an HTML website
                  - text: with search and navigation. Not markdown files that pretend to be a wiki. An actual, browsable, shareable website.
                - paragraph [ref=e274]:
                  - strong [ref=e275]: Why build an LLM-Wiki from scratch when Cherry Studio already exists?
                - paragraph [ref=e276]: Why spend weeks "vibe-coding" a markdown graveyard that collapses at 1,000 files, when you can drag your documents into Cherry Studio, connect your API key, and have a working knowledge base in some minutes?
                - paragraph [ref=e277]: The answer is not technical. It's social. People are not building LLM-Wikis because it's the best solution. They are building it because Karpathy said so.
                - paragraph [ref=e278]: Cherry Studio is real. It works. It respects your data. It has 33k+ stars on GitHub. It's been built by people who actually wrote code, not by a guy in AI psychosis telling his LLM to "figure it out."
                - paragraph [ref=e279]:
                  - text: The tools already exist. 🐑🐑🐑
                  - link "https://www.cherry-ai.com/" [ref=e280] [cursor=pointer]:
